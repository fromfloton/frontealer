<!DOCTYPE html>
<html>
<head>
    <style>
        body { margin: 0; overflow: hidden; background-color: #EAF3F0; }
        #canvas-container { width: 100vw; height: 100vh; }
    </style>
</head>
<body>
    <div id="canvas-container"></div>

    <script type="module">
        import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js';
        import { OrbitControls } from 'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/controls/OrbitControls.js';

        // 1. Scene Setup
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color('#EAF3F0');
        scene.fog = new THREE.FogExp2('#EAF3F0', 0.015);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(12, 10, 14);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        container.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.target.set(0, 3, 0);

        // 2. Lights
        const hemiLight = new THREE.HemisphereLight(0xffffff, 0xcbd5e1, 0.9);
        scene.add(hemiLight);
        const dirLight = new THREE.DirectionalLight(0xffffff, 1.3);
        dirLight.position.set(8, 12, 6);
        dirLight.castShadow = true;
        scene.add(dirLight);

        // 3. Models (리드파트 디지털 트윈)
        const matMetal = new THREE.MeshStandardMaterial({ color: 0x64748B, roughness: 0.3, metalness: 0.6 });
        const matPlant = new THREE.MeshStandardMaterial({ color: 0x397A67, roughness: 0.7 });
        const matLeaf = new THREE.MeshStandardMaterial({ color: 0x509C85, side: THREE.DoubleSide });

        // Plant & Pot
        const plantGroup = new THREE.Group();
        const pot = new THREE.Mesh(new THREE.CylinderGeometry(1, 0.8, 1.4), new THREE.MeshStandardMaterial({color: 0x2A5D4E}));
        pot.position.y = 0.7; pot.castShadow = true; plantGroup.add(pot);
        const stem = new THREE.Mesh(new THREE.CylinderGeometry(0.1, 0.1, 3.0), matPlant);
        stem.position.y = 2.8; plantGroup.add(stem);
        scene.add(plantGroup);

        // Apparatus (Head)
        const apparatusGroup = new THREE.Group();
        const head = new THREE.Group(); head.position.set(0, 4.5, 0);
        const headBase = new THREE.Mesh(new THREE.BoxGeometry(2, 1.6, 2), new THREE.MeshStandardMaterial({color: 0xffffff}));
        headBase.castShadow = true; head.add(headBase);
        
        const lightModule = new THREE.Mesh(new THREE.CylinderGeometry(0.6, 0.6, 0.3), matMetal);
        lightModule.rotation.x = Math.PI / 2; lightModule.position.z = 1.0; head.add(lightModule);
        
        const nozzle = new THREE.Mesh(new THREE.ConeGeometry(0.2, 0.6), matMetal);
        nozzle.rotation.z = -Math.PI / 2; nozzle.position.x = 1.0; head.add(nozzle);
        
        apparatusGroup.add(head); scene.add(apparatusGroup);

        // Effects
        const beam = new THREE.Mesh(new THREE.ConeGeometry(2, 5).translate(0,-2.5,0), new THREE.MeshBasicMaterial({color: 0xFFB800, transparent: true, opacity: 0, blending: THREE.AdditiveBlending}));
        beam.position.set(0, 0.9, 0); beam.rotation.x = Math.PI / 2; lightModule.add(beam);

        // 4. Interaction Loop (Figma 시연용 자동 사이클)
        let mode = 'idle';
        let timer = 0;
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            const t = clock.getElapsedTime();
            controls.update();

            // 15초 주기로 자동 애니메이션 전환 (시연용)
            const cycle = Math.floor(t / 5) % 4;
            if(cycle === 0) mode = 'idle';
            else if(cycle === 1) mode = 'light';
            else if(cycle === 2) mode = 'water';
            else if(cycle === 3) mode = 'physics';

            let targetY = 4.8;
            if (mode === 'light') {
                targetY = 5.2; head.rotation.x = -Math.PI/10;
                beam.material.opacity = Math.sin(t * 10) * 0.4 + 0.4;
            } else if (mode === 'water') {
                targetY = 5.2; head.rotation.z = Math.PI/10;
                beam.material.opacity = 0;
            } else if (mode === 'physics') {
                targetY = 3.8; head.position.x = Math.sin(t * 40) * 0.1;
                beam.material.opacity = 0;
            } else {
                targetY = 4.8 + Math.sin(t * 2) * 0.1;
                head.rotation.set(0,0,0); head.position.x = 0;
                beam.material.opacity = 0;
            }
            head.position.y = THREE.MathUtils.lerp(head.position.y, targetY, 0.05);

            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = container.clientWidth / container.clientHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(container.clientWidth, container.clientHeight);
        });
    </script>
</body>
</html>
